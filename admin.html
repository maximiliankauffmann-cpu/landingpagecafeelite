<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Café Elite — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f1ea; font-family: 'Inter', sans-serif; color: #1a0f0a; min-height: 100vh; }

    /* ── Login ── */
    #login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0d0905;
    }
    .login-box {
      width: 360px; padding: 48px; background: #1a1208;
      border: 1px solid rgba(200,168,130,0.2);
    }
    .login-box h1 { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: #faf7f2; margin-bottom: 8px; }
    .login-box p  { font-size: 13px; color: #8b7355; margin-bottom: 32px; }
    .login-box input {
      width: 100%; padding: 14px 16px; background: transparent;
      border: 1px solid rgba(200,168,130,0.4); color: #faf7f2;
      font-family: 'Inter', sans-serif; font-size: 14px; outline: none; margin-bottom: 16px;
    }
    .login-box input:focus { border-color: #c8a882; }
    .login-box button {
      width: 100%; padding: 14px; background: #c8a882; color: #1a0f0a;
      border: none; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .login-box button:hover { background: #d4b898; }
    .login-error { font-size: 13px; color: #e07070; margin-top: 12px; display: none; }

    /* ── Dashboard ── */
    #dashboard { display: none; }

    header {
      background: #0d0905; padding: 20px 48px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(200,168,130,0.15);
    }
    .header-logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; color: #faf7f2; }
    .header-logo span { color: #c8a882; }
    .header-right { display: flex; align-items: center; gap: 20px; }
    .header-right p { font-size: 12px; color: #8b7355; letter-spacing: 0.05em; }
    .btn-logout {
      padding: 8px 18px; background: transparent;
      border: 1px solid rgba(200,168,130,0.4); color: #c8a882;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(200,168,130,0.1); }

    main { padding: 40px 48px; max-width: 1400px; }

    /* ── Stats ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
    .stat-card {
      background: white; padding: 28px 32px;
      border: 1px solid rgba(200,168,130,0.2);
    }
    .stat-card .num { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 700; color: #1a0f0a; line-height: 1; }
    .stat-card .lbl { font-size: 11px; color: #8b7355; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 8px; }

    /* ── Controls ── */
    .controls {
      display: flex; gap: 16px; align-items: center; margin-bottom: 24px; flex-wrap: wrap;
    }
    .controls input[type=date], .controls select {
      padding: 10px 16px; border: 1px solid rgba(200,168,130,0.5);
      background: white; font-family: 'Inter', sans-serif; font-size: 13px;
      color: #1a0f0a; outline: none; cursor: pointer;
    }
    .controls input[type=date]:focus, .controls select:focus { border-color: #c8a882; }
    .btn-filter {
      padding: 10px 24px; background: #1a0f0a; color: #f2ead8;
      border: none; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-filter:hover { background: #2d1a12; }
    .btn-clear {
      padding: 10px 20px; background: transparent;
      border: 1px solid rgba(200,168,130,0.4); color: #8b7355;
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
    }
    .controls-right { margin-left: auto; }
    .result-count { font-size: 13px; color: #8b7355; }

    /* ── Table ── */
    .table-wrap { background: white; border: 1px solid rgba(200,168,130,0.2); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 2px solid rgba(200,168,130,0.3); }
    th {
      text-align: left; padding: 16px 20px;
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #8b7355;
      white-space: nowrap;
    }
    td { padding: 18px 20px; font-size: 14px; border-bottom: 1px solid rgba(200,168,130,0.12); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #faf8f4; }

    .badge {
      display: inline-block; padding: 4px 10px;
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600;
    }
    .badge.confirmed { background: #e8f4ec; color: #2d7a47; }
    .badge.cancelled { background: #faeaea; color: #b03030; }

    .party-size { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; color: #1a0f0a; }
    .time-cell   { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: #1a0f0a; }
    .name-cell   { font-weight: 500; }
    .email-cell  { font-size: 13px; color: #8b7355; }
    .date-cell   { font-weight: 500; white-space: nowrap; }
    .note-cell   { font-size: 13px; color: #8b7355; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .btn-cancel {
      padding: 7px 16px; background: transparent;
      border: 1px solid rgba(180,60,60,0.4); color: #b03030;
      font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }
    .btn-cancel:hover { background: #faeaea; }
    .btn-cancel:disabled { opacity: 0.4; cursor: default; }

    .empty-state { padding: 60px; text-align: center; color: #8b7355; font-size: 14px; }

    /* ── Today panel ── */
    .today-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: #1a0f0a; }
    .section-sub   { font-size: 13px; color: #8b7355; }

    .toast {
      position: fixed; bottom: 32px; right: 32px;
      padding: 14px 24px; background: #1a0f0a; color: #f2ead8;
      font-size: 13px; letter-spacing: 0.04em;
      transform: translateY(80px); opacity: 0; transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-box">
    <h1>Café Elite</h1>
    <p>Admin Dashboard — Staff Only</p>
    <input type="password" id="pwd-input" placeholder="Password" onkeydown="if(event.key==='Enter')login()"/>
    <button onclick="login()">Sign In</button>
    <p class="login-error" id="login-error">Incorrect password.</p>
  </div>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard">
  <header>
    <div class="header-logo">Café <span>Elite</span></div>
    <div class="header-right">
      <p id="header-date"></p>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <main>

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="num" id="stat-today">—</div><div class="lbl">Reservations Today</div></div>
      <div class="stat-card"><div class="num" id="stat-guests">—</div><div class="lbl">Guests Today</div></div>
      <div class="stat-card"><div class="num" id="stat-upcoming">—</div><div class="lbl">Upcoming (incl. today)</div></div>
      <div class="stat-card"><div class="num" id="stat-total">—</div><div class="lbl">All-Time Confirmed</div></div>
    </div>

    <!-- Today's reservations -->
    <div style="margin-bottom: 48px;">
      <div class="today-header">
        <div>
          <div class="section-title">Today</div>
          <div class="section-sub" id="today-label"></div>
        </div>
      </div>
      <div class="table-wrap" id="today-table-wrap">
        <div class="empty-state">Loading...</div>
      </div>
    </div>

    <!-- All reservations with filter -->
    <div>
      <div class="today-header">
        <div>
          <div class="section-title">All Reservations</div>
        </div>
      </div>
      <div class="controls">
        <input type="date" id="filter-date" />
        <select id="filter-status">
          <option value="">All statuses</option>
          <option value="confirmed">Confirmed</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <button class="btn-filter" onclick="loadAll()">Filter</button>
        <button class="btn-clear" onclick="clearFilter()">Clear</button>
        <div class="controls-right">
          <span class="result-count" id="result-count"></span>
        </div>
      </div>
      <div class="table-wrap" id="all-table-wrap">
        <div class="empty-state">Loading...</div>
      </div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  let adminPassword = '';

  // ── Auth ──
  function login() {
    adminPassword = document.getElementById('pwd-input').value;
    fetch('/api/admin/stats', { headers: { 'x-admin-password': adminPassword } })
      .then(r => {
        if (r.ok) {
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          initDashboard();
        } else {
          document.getElementById('login-error').style.display = 'block';
          adminPassword = '';
        }
      });
  }

  function logout() {
    adminPassword = '';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('pwd-input').value = '';
  }

  // ── Init ──
  function initDashboard() {
    const now = new Date();
    document.getElementById('header-date').textContent = now.toLocaleDateString('en-DE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('today-label').textContent = now.toLocaleDateString('en-DE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    loadStats();
    loadToday();
    loadAll();
  }

  // ── API helpers ──
  function apiFetch(url) {
    return fetch(url, { headers: { 'x-admin-password': adminPassword } }).then(r => r.json());
  }

  async function loadStats() {
    const s = await apiFetch('/api/admin/stats');
    document.getElementById('stat-today').textContent    = s.todayCount;
    document.getElementById('stat-guests').textContent   = s.todayGuests;
    document.getElementById('stat-upcoming').textContent = s.upcomingCount;
    document.getElementById('stat-total').textContent    = s.totalCount;
  }

  async function loadToday() {
    const rows = await apiFetch('/api/admin/reservations/today');
    document.getElementById('today-table-wrap').innerHTML = buildTable(rows, true);
  }

  async function loadAll() {
    const date   = document.getElementById('filter-date').value;
    const status = document.getElementById('filter-status').value;
    let url = '/api/admin/reservations?';
    if (date)   url += `date=${date}&`;
    if (status) url += `status=${status}`;
    const rows = await apiFetch(url);
    document.getElementById('result-count').textContent = `${rows.length} result${rows.length !== 1 ? 's' : ''}`;
    document.getElementById('all-table-wrap').innerHTML = buildTable(rows, false);
  }

  function clearFilter() {
    document.getElementById('filter-date').value   = '';
    document.getElementById('filter-status').value = '';
    loadAll();
  }

  // ── Table builder ──
  function buildTable(rows, hideDate) {
    if (!rows.length) return '<div class="empty-state">No reservations found.</div>';

    const dateCol = hideDate ? '' : '<th>Date</th>';
    let html = `<table>
      <thead><tr>
        ${dateCol}
        <th>Time</th>
        <th>Name</th>
        <th>Email</th>
        <th>Guests</th>
        <th>Note</th>
        <th>Status</th>
        <th>Booked at</th>
        <th></th>
      </tr></thead><tbody>`;

    rows.forEach(r => {
      const dateStr = new Date(r.date + 'T12:00:00').toLocaleDateString('en-DE', { weekday: 'short', day: 'numeric', month: 'short' });
      const createdStr = new Date(r.created).toLocaleDateString('en-DE', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
      const isCancelled = r.status === 'cancelled';

      html += `<tr>
        ${hideDate ? '' : `<td class="date-cell">${dateStr}</td>`}
        <td class="time-cell">${r.time} – ${r.end_time}</td>
        <td class="name-cell">${esc(r.name)}</td>
        <td class="email-cell">${esc(r.email)}</td>
        <td><span class="party-size">${r.party}</span></td>
        <td class="note-cell" title="${esc(r.message || '')}">${esc(r.message || '—')}</td>
        <td><span class="badge ${r.status}">${r.status}</span></td>
        <td class="email-cell">${createdStr}</td>
        <td>
          <button class="btn-cancel" onclick="cancelReservation(${r.id}, this)"
            ${isCancelled ? 'disabled' : ''}>
            ${isCancelled ? 'Cancelled' : 'Cancel'}
          </button>
        </td>
      </tr>`;
    });

    return html + '</tbody></table>';
  }

  // ── Cancel ──
  async function cancelReservation(id, btn) {
    if (!confirm('Cancel this reservation? This will also remove it from Google Calendar.')) return;
    btn.disabled = true;
    btn.textContent = '...';

    const res = await fetch(`/api/admin/reservations/${id}`, {
      method: 'DELETE',
      headers: { 'x-admin-password': adminPassword }
    });

    if (res.ok) {
      showToast('Reservation cancelled.');
      loadStats();
      loadToday();
      loadAll();
    } else {
      const data = await res.json();
      showToast(data.error || 'Something went wrong.');
      btn.disabled = false;
      btn.textContent = 'Cancel';
    }
  }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
